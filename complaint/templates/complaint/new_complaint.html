<!DOCTYPE html>
<html data-theme="dark">
<head>
    <title>New Complaint — HostelHub</title>
    {% load static %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'complaint/css/style.css' %}">
</head>
<body>


<nav class="topnav">
    <div class="nav-logo">
        <span class="logo-dot"></span>
        <a href="{% url 'student_dashboard' %}" class="logo-text">Hostel<em>Hub</em></a>
    </div>
    <div class="nav-right">
        <button class="theme-btn" id="themeBtn">
            <span id="themeIcon">☀️</span>
            <span class="theme-track"><span class="theme-thumb"></span></span>
            <span id="themeLabel">Light</span>
        </button>
        <a href="{% url 'complaints' %}" class="nav-back">← Back</a>
    </div>
</nav>

<div class="page-wrap">

    <div class="page-header">
        <p class="page-eye">New Complaint</p>
        <h1 class="page-title">Submit a <em>Complaint</em></h1>
        <p class="page-sub">Fill in the details below and submit to the warden.</p>
    </div>

    <div class="form-card">
        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label class="form-label">Title</label>
                <input type="text" name="title" class="form-input"
                    placeholder="Brief title of your complaint" required>
            </div>

            <div class="form-group">
                <label class="form-label">Category</label>
                <select name="category" class="form-input" required>
                    <option value="">Select category</option>
                    <option value="maintenance">Maintenance</option>
                    <option value="cleanliness">Cleanliness</option>
                    <option value="food">Food</option>
                    <option value="security">Security</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-input"
                    rows="5"
                    placeholder="Describe the issue in detail..." required></textarea>
            </div>

            <div class="form-actions">
                <a href="{% url 'complaints' %}" class="cancel-btn">Cancel</a>
                <button type="submit" class="submit-btn">Submit Complaint →</button>
            </div>
        </form>
    </div>

</div>

<script src="{% static 'complaint/js/script.js' %}"></script>
</body>
</html>
